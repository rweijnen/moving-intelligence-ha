name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create zip asset
        run: |
          cd custom_components/mi_home
          zip -r ../../mi_home.zip . -x '__pycache__/*' '*.pyc'

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" mi_home.zip --clobber
